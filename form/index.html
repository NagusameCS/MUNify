<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MUNify orm</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/ui.js"></script>
</head>
<body class="bg-neutral-50 dark:bg-neutral-900 text-neutral-900 min-h-screen flex flex-col">
<header class="border-b border-neutral-200 dark:border-neutral-700 bg-white dark:bg-neutral-800/70 backdrop-blur mb-6 site-foreground">
  <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
    <a href="../" class="font-semibold tracking-tight">MUNify</a>
    <nav class="hidden md:flex gap-6 text-sm">
      <a href="../" class="hover:underline font-medium">Home</a>
      <a href="../design/" class="hover:underline">Designer</a>
      <a href="./" class="hover:underline font-medium">Form</a>
      <a href="../settings/" class="hover:underline">Settings</a>
      <a href="../info/" class="hover:underline">Info</a>
    </nav>
    <div class="flex gap-2 items-center text-sm">
      <!-- Dark Mode Toggle -->
      <button data-dark-mode-toggle onclick="window.MUNui.toggleDarkMode()" 
              class="p-2 rounded-lg hover:bg-neutral-200 dark:hover:bg-neutral-700 transition-colors"
              aria-label="Toggle dark mode">
        <svg data-icon="moon" class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
          <path d="M17.293 13.293A8 8 0 6.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
        </svg>
        <svg data-icon="sun" class="w-4 h-4 hidden" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
        </svg>
      </button>
      <span id="signIndicator" class="text-green-600 hidden">Signed in</span>
      <button id="btnSignOutHome" class="underline hidden">Sign out</button>
    </div>
  </div>
</header>
<main class="flex-1 max-w-3xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-4">Delegate Registration</h1>
    <div id="msg" class="mb-4 text-sm text-neutral-700 dark:text-neutral-300" aria-live="polite"></div>

    <form id="delegateForm" class="bg-white dark:bg-neutral-800 p-6 rounded shadow">
      <label class="block mb-3">
        <span class="block font-medium">Full name</span>
        <input id="name" name="name" required class="mt-1 block w-full border border-neutral-200 dark:border-neutral-700 rounded-lg p-2" />
      </label>
      <label class="block mb-3">
        <span class="block font-medium">Email</span>
        <input id="email" name="email" type="email" required class="mt-1 block w-full border border-neutral-200 dark:border-neutral-700 rounded-lg p-2" />
      </label>
      <label class="block mb-3">
        <span class="block font-medium">Year</span>
        <input id="year" name="year" class="mt-1 block w-full border border-neutral-200 dark:border-neutral-700 rounded-lg p-2" />
      </label>

      <div id="selections" class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
        <!-- dynamic select lists will be inserted here -->
      </div>

      <div class="flex gap-2">
        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded">Submit</button>
        <button id="btnSignIn" type="button" class="px-4 py-2 border border-neutral-200 dark:border-neutral-700 rounded">Sign in</button>
      </div>
    </form>
  </main>

  <script>
    // Read key from hash like #key-goes-here
    const rawHash = location.hash ? location.hash.slice(1) : null;
    const msg = document.getElementById('msg');
    const cfg = window.MUNauth && window.MUNauth.getConfig ? window.MUNauth.getConfig() : {};
    const keyFromHash = rawHash ? rawHash.split('-')[0] : null;

    if (!cfg.sheetId && keyFromHash) {
      // if user provided a key we don't have, show limited message
      msg.textContent = 'This form is in public-key mode. You will need to sign in to submit.';
    }

    document.getElementById('btnSignIn').addEventListener('click', async () => {
      try { await window.MUNauth.requestAccess(); msg.textContent = 'Signed in. You can now submit.'; } catch(e){ msg.textContent = 'Could not sign in: ' + (e.message||e); }
    });

    // Attempt automatic registration/provisioning if an id token is present
    (async function(){
      if (window.MUNauth && typeof window.MUNauth.autoRegisterIfNeeded === 'function') {
        try {
          const res = await window.MUNauth.autoRegisterIfNeeded();
          if (res && (res.status === 'registered' || res.status === 'provisioned')) {
            msg.textContent = 'Auto-setup complete. You can submit.';
            // reload config-driven UI (like loadOptions)
            try { await loadOptions(); } catch(e) { console.warn('loadOptions after autoRegister failed', e); }
          }
        } catch (e) { console.warn('autoRegisterIfNeeded error', e); }
      }
    })();

    // Build 5 selection dropdowns (non-repeating enforced client-side)
    const selectionsEl = document.getElementById('selections');
    const selects = [];
    for (let i=1;i<=5;i++){
      const wrap = document.createElement('label'); wrap.className='block';
      wrap.innerHTML = `<span class="block font-medium">Delegate Selection ${i}</span>`;
      const select = document.createElement('select'); select.name = 'sel'+i; select.className='mt-1 block w-full border border-neutral-200 dark:border-neutral-700 rounded-lg p-2';
      select.innerHTML = `<option value="">-- choose --</option>`;
      wrap.appendChild(select);
      selectionsEl.appendChild(wrap);
      selects.push(select);
    }

    // Load committee list from Forms sheet if signed in
    async function loadOptions(){
      const conf = window.MUNauth.getConfig();
      if (!conf || !conf.sheetId) return;
      const token = window.MUNauth && window.MUNauth.getConfig && window.MUNauth.getConfig().idToken ? window.MUNauth.getConfig().idToken : null;
      try {
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${conf.sheetId}/values/Forms!B2:B100`;
        const res = await fetch(url, { headers: { Authorization: 'Bearer ' + window.MUNauth.getConfig().idToken } });
        if (!res.ok) throw new Error('Could not fetch options');
        const data = await res.json();
        const rows = (data.values||[]).flat();
        // populate selects
        selects.forEach(s => {
          // remove old options except first
          while (s.options.length>1) s.remove(1);
          rows.forEach(r => { const o=document.createElement('option'); o.value=r; o.textContent=r; s.appendChild(o); });
        });
      } catch(e){ console.warn('Could not load options', e); }
    }

    loadOptions();

    // Prevent duplicate selections
    selectionsEl.addEventListener('change', (e)=>{
      const chosen = new Set([...selects].map(s=>s.value).filter(Boolean));
      selects.forEach(s=>{
        [...s.options].forEach(o=>{
          if (!o.value) return; // allow empty
          const disabled = chosen.has(o.value) && s.value !== o.value;
          o.disabled = disabled;
        });
      });
    });

    document.getElementById('delegateForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const form = e.target;
      const vals = new FormData(form);
      const row = [];
      row.push(vals.get('name')||'');
      row.push(vals.get('email')||'');
      row.push(vals.get('year')||'');
      row.push(cryptoRandom(8)); // Delegate ID
      for (let i=1;i<=5;i++) row.push(vals.get('sel'+i)||'');

      // append via Apps Script server endpoint
      try {
        const cfg = window.MUNauth.getConfig();
        const appsScriptUrl = localStorage.getItem('munifyAppsScriptUrl') || cfg.appsScriptUrl || 'APPS_SCRIPT_URL_PLACEHOLDER';
        if (!appsScriptUrl || appsScriptUrl === 'APPS_SCRIPT_URL_PLACEHOLDER') {
          const m = 'Server not configured. Please set munifyAppsScriptUrl in Settings.';
          window.MUNui.toast(m, { type: 'error' });
          return;
        }
        const key = cfg.key || (rawHash ? rawHash.split('-')[0] : null);
        if (!key) {
          const m = 'No key configured.';
          window.MUNui.toast(m, { type: 'error' });
          return;
        }
  await window.MUNauth.appendViaServer(appsScriptUrl, key, row);
  msg.textContent = 'Submission saved. Thank you!';
  window.MUNui.toast('Submission sent', { type: 'success' });
  } catch (err) { console.error(err); const m = 'Could not save submission: ' + (err.message||err); window.MUNui.toast(m, { type: 'error' }); }
    });

    function cryptoRandom(len){ const bytes=new Uint8Array(len); crypto.getRandomValues(bytes); return Array.from(bytes).map(b=>('0'+b.toString(16)).slice(-2)).join(''); }
  </script>
  
  <!-- Footer -->
  <footer class="bg-neutral-100 dark:bg-neutral-800 mt-12 py-6 text-center text-sm text-neutral-600 dark:text-neutral-300 border-t border-neutral-200 dark:border-neutral-700">

      <span>© 2025 MUN Forms</span>

        </svg>
        GitHub

    </div>
  </footer>
</body>
</html>
