<body class="bg-neutral-50 text-neutral-900 min-h-screen flex flex-col dark:bg-neutral-900 dark:text-neutral-100">

<main class="max-w-6xl mx-auto px-4 pop-target site-foreground flex-1 w-full">
  <section class="pt-4 md:pt-12 pb-16 relative">
    <div class="space-y-6">
      <h1 class="text-3xl md:text-5xl font-bold leading-tight text-glow-light">
        Delegate <span class="bg-blue-600 text-white px-2 py-0.5 rounded-md">Registration</span>
      </h1>
      <p class="text-lg text-neutral-200 max-w-xl">Submit your registration for the conference. All delegate information is securely stored and managed.</p>
    </div>
  </section>

  <section class="py-12 md:py-16 space-y-10">
    <div id="msg" class="mb-4 text-sm text-neutral-300" aria-live="polite"></div>

  <form id="delegateForm" class="reveal frost-pane bg-white p-6 rounded-xl shadow-sm dark:bg-neutral-800/70 dark:border-neutral-700" data-frost>
      <label class="block mb-3">
        <span class="block font-medium">Full name</span>
        <input id="name" name="name" required class="mt-1 block w-full border rounded-lg p-2" />
      </label>
      <label class="block mb-3">
        <span class="block font-medium">Email</span>
        <input id="email" name="email" type="email" required class="mt-1 block w-full border rounded-lg p-2" />
      </label>
      <label class="block mb-3">
        <span class="block font-medium">Year</span>
        <input id="year" name="year" class="mt-1 block w-full border rounded-lg p-2" />
      </label>

      <div id="selections" class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
        <!-- dynamic select lists will be inserted here -->
      </div>

      <div class="flex gap-2">
        <button type="submit" class="px-5 py-3 rounded-lg bg-blue-600 text-white font-medium shadow hover:underline focus-outline">Submit Registration</button>
        <button id="btnSignIn" type="button" class="px-5 py-3 rounded-lg border font-medium hover:bg-neutral-50 focus-outline dark:hover:bg-neutral-700/60">Sign in</button>
      </div>
    </form>
  </section>
  </main>

  <!-- Footer -->

  <script>
    // Read key from hash like #key-goes-here
    const rawHash = location.hash ? location.hash.slice(1) : null;
    const msg = document.getElementById('msg');
    const cfg = window.MUNauth && window.MUNauth.getConfig ? window.MUNauth.getConfig() : {};
    const keyFromHash = rawHash ? rawHash.split('-')[0] : null;

    if (!cfg.sheetId && keyFromHash) {
      // if user provided a key we don't have, show limited message
      msg.textContent = 'This form is in public-key mode. You will need to sign in to submit.';
    }

    document.getElementById('btnSignIn').addEventListener('click', async () => {
      try { await window.MUNauth.requestAccess(); msg.textContent = 'Signed in. You can now submit.'; } catch(e){ msg.textContent = 'Could not sign in: ' + (e.message||e); }
    });

    // Attempt automatic registration/provisioning if an id token is present
    (async function(){
      if (window.MUNauth && typeof window.MUNauth.autoRegisterIfNeeded === 'function') {
        try {
          const res = await window.MUNauth.autoRegisterIfNeeded();
          if (res && (res.status === 'registered' || res.status === 'provisioned')) {
            msg.textContent = 'Auto-setup complete. You can submit.';
            // reload config-driven UI (like loadOptions)
            try { await loadOptions(); } catch(e) { console.warn('loadOptions after autoRegister failed', e); }
          }
        } catch (e) { console.warn('autoRegisterIfNeeded error', e); }
      }
    })();

    // Build 5 selection dropdowns (non-repeating enforced client-side)
    const selectionsEl = document.getElementById('selections');
    const selects = [];
    for (let i=1;i<=5;i++){
      const wrap = document.createElement('label'); wrap.className='block';
      wrap.innerHTML = `<span class="block font-medium">Delegate Selection ${i}</span>`;
      const select = document.createElement('select'); select.name = 'sel'+i; select.className='mt-1 block w-full border rounded-lg p-2';
      select.innerHTML = `<option value="">-- choose --</option>`;
      wrap.appendChild(select);
      selectionsEl.appendChild(wrap);
      selects.push(select);
    }

    // Load committee list from Forms sheet if signed in
    async function loadOptions(){
      const conf = window.MUNauth.getConfig();
      if (!conf || !conf.sheetId) return;
      const token = window.MUNauth && window.MUNauth.getConfig && window.MUNauth.getConfig().idToken ? window.MUNauth.getConfig().idToken : null;
      try {
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${conf.sheetId}/values/Forms!B2:B100`;
        const res = await fetch(url, { headers: { Authorization: 'Bearer ' + window.MUNauth.getConfig().idToken } });
        if (!res.ok) throw new Error('Could not fetch options');
        const data = await res.json();
        const rows = (data.values||[]).flat();
        // populate selects
        selects.forEach(s => {
          // remove old options except first
          while (s.options.length>1) s.remove(1);
          rows.forEach(r => { const o=document.createElement('option'); o.value=r; o.textContent=r; s.appendChild(o); });
        });
      } catch(e){ console.warn('Could not load options', e); }
    }

    loadOptions();

    // Prevent duplicate selections
    selectionsEl.addEventListener('change', (e)=>{
      const chosen = new Set([...selects].map(s=>s.value).filter(Boolean));
      selects.forEach(s=>{
        [...s.options].forEach(o=>{
          if (!o.value) return; // allow empty
          const disabled = chosen.has(o.value) && s.value !== o.value;
          o.disabled = disabled;
        });
      });
    });

    document.getElementById('delegateForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const form = e.target;
      const vals = new FormData(form);
      const row = [];
      row.push(vals.get('name')||'');
      row.push(vals.get('email')||'');
      row.push(vals.get('year')||'');
      row.push(cryptoRandom(8)); // Delegate ID
      for (let i=1;i<=5;i++) row.push(vals.get('sel'+i)||'');

      // append via Apps Script server endpoint
      try {
        const cfg = window.MUNauth.getConfig();
        const appsScriptUrl = localStorage.getItem('munifyAppsScriptUrl') || cfg.appsScriptUrl || 'APPS_SCRIPT_URL_PLACEHOLDER';
        if (!appsScriptUrl || appsScriptUrl === 'APPS_SCRIPT_URL_PLACEHOLDER') {
          const m = 'Server not configured. Please set munifyAppsScriptUrl in Settings.';
          window.MUNui.toast(m, { type: 'error' });
          return;
        }
        const key = cfg.key || (rawHash ? rawHash.split('-')[0] : null);
        if (!key) {
          const m = 'No key configured.';
          window.MUNui.toast(m, { type: 'error' });
          return;
        }
  await window.MUNauth.appendViaServer(appsScriptUrl, key, row);
  msg.textContent = 'Submission saved. Thank you!';
  window.MUNui.toast('Submission sent', { type: 'success' });
  } catch (err) { console.error(err); const m = 'Could not save submission: ' + (err.message||err); window.MUNui.toast(m, { type: 'error' }); }
    });

    function cryptoRandom(len){ const bytes=new Uint8Array(len); crypto.getRandomValues(bytes); return Array.from(bytes).map(b=>('0'+b.toString(16)).slice(-2)).join(''); }
  </script>

  <!-- App Script -->
  <script type="module">
  async function initLazyThree() {
    try {
      // Import Three.js + GLTFLoader

  const THREE = await import('https://esm.sh/three@0.155.0');
  const { GLTFLoader } = await import('https://esm.sh/three@0.155.0/examples/jsm/loaders/GLTFLoader.js');

      const container = document.getElementById('earth-bg');
      if (!container) return;

  const width = window.innerWidth;
  const height = window.innerHeight;
  // Desired fraction of screen width the earth should occupy
  const screenFraction = 0.5;

  // Renderer
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setClearColor(0x000000, 0);
  renderer.setSize(width, height);
  renderer.setPixelRatio(window.devicePixelRatio || 1);
  // Disable tone mapping (flat look, no post exposure)
  renderer.toneMapping = THREE.NoToneMapping;
  renderer.toneMappingExposure = 1;

  // Ensure the canvas covers the viewport and doesn't block UI interactions
  renderer.domElement.style.position = 'fixed';
  renderer.domElement.style.top = '0';
  renderer.domElement.style.left = '0';
  renderer.domElement.style.width = '100%';
  renderer.domElement.style.height = '100%';
  renderer.domElement.style.zIndex = '-2';
  renderer.domElement.style.pointerEvents = 'none';

  container.appendChild(renderer.domElement);

  // Camera
  const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 100);
  camera.position.set(0, 0, 7);
  // Scroll-interaction targets (will be initialized further after model fits)
  let baseDistance = camera.position.z;
  let desiredCameraY = 0;
  let desiredCameraZ = baseDistance;
  // tuning: how far up/down and how much z shift with scrolling
  const cameraYRange = 4.0; // world units up/down total
  const cameraZRangeFactor = 0.12; // reduced from 0.5 for subtler depth shift


      // Scene + Lighting
  const scene = new THREE.Scene();
      
      // No environment lighting (flat lighting requested)

      let earthObj = null;
      const loader = new GLTFLoader();

      // Fallback sphere if GLB fails
      function createFallbackSphere() {
  const geom = new THREE.SphereGeometry(2.0, 32, 32);
  const mat = new THREE.MeshBasicMaterial({ color: 0x4aa3df });
        const sphere = new THREE.Mesh(geom, mat);
  // Scale the fallback so its diameter occupies the desired fraction of the screen width
  const fov = camera.fov * (Math.PI / 180);
  const aspect = width / height;
  const desiredWorldWidth = 2 * camera.position.z * Math.tan(fov / 2) * aspect * screenFraction;
  const sphereScale = desiredWorldWidth / 4; // geom diameter is 4 (radius 2)
  sphere.scale.setScalar(sphereScale || 1);
  // Center the fallback vertically
  sphere.position.y = 0;
        scene.add(sphere);
        earthObj = sphere;
  // No atmosphere shader for fallback (flat look)
        console.warn('Using fallback procedural globe (scaled/offset).');
      }

      // Animate
      function animate() {
        requestAnimationFrame(animate);
        // Reduce rotation speed by 10x (was 0.003)
        if (earthObj) earthObj.rotation.y += 0.00012; // reduced rotation speed

        // Smoothly interpolate camera towards desired targets
        // (using a simple lerp for smooth motion)
        camera.position.y += (desiredCameraY - camera.position.y) * 0.08;
        camera.position.z += (desiredCameraZ - camera.position.z) * 0.08;
        camera.lookAt(0, 0, 0);

        renderer.render(scene, camera);
      }
      animate();

      // Load model
      function tryLoad() {
        loader.load(
          '../earth.glb',
          (gltf) => {
              try {
                const earth = gltf.scene || (gltf.scenes && gltf.scenes[0]);
                if (!earth) throw new Error('GLTF has no scene');

                // Add to scene first
                scene.add(earth);

                // Compute bounding box and center the model
                const box = new THREE.Box3().setFromObject(earth);
                const size = new THREE.Vector3();
                box.getSize(size);
                const center = new THREE.Vector3();
                box.getCenter(center);

                // Recenter model so its bounding box center is at the origin
                earth.position.x = center.x;
                earth.position.y = center.y;
                earth.position.z = center.z;

                // Compute a reasonable scale if the model is unusually small/large
                  // Compute scale so the model occupies the desired fraction of screen width
                  const boundingSphere = box.getBoundingSphere(new THREE.Sphere());
                  const radiusModel = boundingSphere.radius; // in model units

                  // Convert camera FOV and aspect to world width at a certain distance
                  const fov = camera.fov * (Math.PI / 180);
                  // We want the model projected width (2 * radiusModel * scale) to equal desiredWorldWidth
                  const desiredWorldWidth = 2 * camera.position.z * Math.tan(fov / 2) * (width / height) * screenFraction;
                  const scale = desiredWorldWidth / (2 * radiusModel);
                  earth.scale.setScalar(scale || 1);

                  // Recompute radius after scaling and position camera to frame model
                  const radius = radiusModel * (earth.scale.x || 1);
                  const distance = Math.abs(radius / Math.sin(fov / 2)) * 1.05; // small padding
                  // Use a fixed camera distance preferred by the user so the globe appears at the chosen scale
                  camera.position.set(0, 0, 6);
                  camera.lookAt(0, 0, 0);

                  // Center model vertically (no downward offset)
                  earth.position.y = 0;

                  // initialize baseDistance and desired targets so scroll math can use them
                  baseDistance = camera.position.z;
                  desiredCameraZ = baseDistance;
                  desiredCameraY = 0;

                  // add scroll listener to update desired camera positions
                  window.addEventListener('scroll', () => {
                    const maxScroll = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
                    const frac = Math.min(1, window.scrollY / maxScroll);
                    // center around 0: -0.5..+0.5
                    const centered = frac - 0.5;
                    desiredCameraY = centered * cameraYRange * -1; // invert so scrolling down moves camera up visually
                    desiredCameraZ = baseDistance * (1 + centered * cameraZRangeFactor);
                  }, { passive: true });

                  earth.rotation.x = 0.4; // tilt for realism

                  earthObj = earth;
                  console.log('3D model loaded and fitted from ../earth.glb (screen-fitted)');

                  // Force flat bright appearance: replace materials with MeshBasicMaterial keeping texture maps
                  earth.traverse(node => {
                    if (node.isMesh) {
                      const oldMat = node.material;
                      let map = oldMat && oldMat.map ? oldMat.map : null;
                      if (map) { map.colorSpace = THREE.SRGBColorSpace || THREE.sRGBEncoding; }
                      const basic = new THREE.MeshBasicMaterial({ map, color: 0xffffff });
                      node.material = basic;
                    }
                  });
                  // Slight canvas brightness for extra pop (adjust as needed)
                  renderer.domElement.style.filter = 'brightness(1.15)';

                earthObj = earth;
                console.log('3D model loaded and fitted from ../earth.glb (scaled/offset, materials enhanced)');
              } catch (e) {
                console.error('Error parsing GLTF', e);
                createFallbackSphere();
              }
          },
          undefined,
          (err) => {
            console.error('Failed to load GLTF ../earth.glb', err);
            createFallbackSphere();
          }
        );
      }
      tryLoad();

      // Resize handling
      window.addEventListener('resize', () => {
        const w = window.innerWidth, h = window.innerHeight;
        renderer.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      });

    } catch (e) {
      console.error('Lazy import failed or initialization error:', e);
    }
  }

  // Initialize after page loads
  window.addEventListener('DOMContentLoaded', () => {
    if ('requestIdleCallback' in window) {
      requestIdleCallback(() => initLazyThree(), { timeout: 2000 });
    } else {
      setTimeout(initLazyThree, 1000);
    }
  });
  </script>

<!-- Reveal & counter animations -->
<script>
document.addEventListener('DOMContentLoaded', () => {
  // IntersectionObserver for .reveal elements
  const reveals = Array.from(document.querySelectorAll('.reveal'));
  const frosts = Array.from(document.querySelectorAll('[data-frost]'));
  if ('IntersectionObserver' in window) {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.18 });
    reveals.forEach(r => io.observe(r));
    // Frost panes: animate in when >30% visible, remove active when fully out
    const ioFrost = new IntersectionObserver((entries)=>{
      entries.forEach(entry=>{
        if (entry.isIntersecting) entry.target.classList.add('frost-active');
        else if (entry.intersectionRatio === 0) entry.target.classList.remove('frost-active');
      });
    }, { threshold: [0,0.3] });
    frosts.forEach(f=> ioFrost.observe(f));
  } else {
    reveals.forEach(r => r.classList.add('visible'));
    frosts.forEach(f=> f.classList.add('frost-active'));
  }
});
</script>
