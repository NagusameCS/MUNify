<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MUNify – Form Designer</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-50 text-neutral-900">
  <!-- HEADER -->
  <header class="bg-white border-b shadow-sm">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="/MUNify/" class="font-semibold text-lg">MUNify</a>
      <div class="flex items-center gap-3">
        <button id="btnSaveForm" class="px-3 py-2 bg-neutral-900 text-white rounded-2xl">Save</button>
        <button id="btnSettings" class="px-3 py-2 border rounded-2xl">Settings</button>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="max-w-5xl mx-auto px-4 py-6">
    <div id="status" class="mb-4 text-sm"></div>

    <!-- Tabs -->
    <div class="border-b mb-4 flex">
      <button id="tabPreview" class="tab-btn px-4 py-2 border-b-2 border-neutral-900 font-medium">Preview</button>
      <button id="tabCode" class="tab-btn px-4 py-2 border-b-2 border-transparent text-neutral-600">Code</button>
    </div>

    <!-- Preview Tab -->
    <div id="previewTab" class="bg-white p-6 rounded-lg border shadow-sm">
      <div id="editablePreview" contenteditable="true" class="min-h-[500px] outline-none"></div>
    </div>

    <!-- Code Tab -->
    <div id="codeTab" class="hidden">
      <textarea id="formCode" class="w-full h-[500px] border rounded-lg p-3 font-mono text-sm"></textarea>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-neutral-100 mt-12 py-6 text-center text-sm text-neutral-600 border-t border-neutral-200">
    <div class="flex flex-col md:flex-row justify-center items-center gap-2">
      <span>© 2025 MUN Forms</span>
      <a href="https://github.com/NagusameCS/MUNify/tree/gh-pages" class="flex items-center gap-1 hover:underline" target="_blank" rel="noopener">
        <svg class="w-4 h-4 fill-current" viewBox="0 0 16 16">
          <path d="M8 0C3.58 0 0 3.58..."/>
        </svg>
        GitHub
      </a>
      <span>Licensed under GNU GPLv3</span>
    </div>
  </footer>

  <script>
    // --- LOGIN & PERMISSION CHECK ---
    const loggedIn = localStorage.getItem("munifyLoggedIn") === "true";
    const scriptUrl = localStorage.getItem("munifyScriptUrl");
    const sheetId = localStorage.getItem("munifySheetId");

    if (!loggedIn || !scriptUrl || !sheetId) {
      alert("You must be signed in and have set up your Apps Script and Google Sheet before using the designer.");
      window.location.href = "/MUNify/";
    }

    // --- BASE TEMPLATE ---
    const baseTemplate = `
<div class="max-w-xl mx-auto">
  <h1 class="text-3xl font-bold mb-2">Example MUNify Form</h1>
  <p class="mb-6 text-neutral-700">Please complete this registration form for the upcoming Model UN conference.</p>
  
  <label class="block mb-4">
    <span class="block font-medium">Full Name</span>
    <input type="text" name="name" class="mt-1 block w-full border rounded-lg p-2" required>
  </label>

  <label class="block mb-4">
    <span class="block font-medium">Country</span>
    <input type="text" name="country" class="mt-1 block w-full border rounded-lg p-2" required>
  </label>

  <label class="block mb-6">
    <span class="block font-medium">Opening Speech</span>
    <textarea name="speech" rows="4" class="mt-1 block w-full border rounded-lg p-2" required></textarea>
  </label>

  <button type="submit" class="bg-neutral-900 text-white px-4 py-2 rounded-lg">Submit</button>
</div>
`;

    // --- ELEMENTS ---
    const status = document.getElementById("status");
    const previewTab = document.getElementById("previewTab");
    const codeTab = document.getElementById("codeTab");
    const formCode = document.getElementById("formCode");
    const editablePreview = document.getElementById("editablePreview");

    status.textContent = `✅ Connected to Apps Script at ${scriptUrl} (Sheet ID: ${sheetId})`;

    // Load form content
    const savedCode = localStorage.getItem("munifyFormCode") || baseTemplate;
    formCode.value = savedCode;
    editablePreview.innerHTML = savedCode;

    // Sync: Code → Preview
    formCode.addEventListener("input", () => {
      editablePreview.innerHTML = formCode.value;
      autoSave();
    });

    // Sync: Preview → Code
    editablePreview.addEventListener("input", () => {
      formCode.value = editablePreview.innerHTML;
      autoSave();
    });

    // Auto-save every few seconds
    function autoSave() {
      localStorage.setItem("munifyFormCode", formCode.value);
    }

    // Save button
    document.getElementById("btnSaveForm").addEventListener("click", () => {
      autoSave();
      alert("Form saved locally. Sync to Google Sheet coming soon.");
    });

    // Tabs
    document.getElementById("tabPreview").addEventListener("click", () => {
      previewTab.classList.remove("hidden");
      codeTab.classList.add("hidden");
      setActiveTab("tabPreview");
    });

    document.getElementById("tabCode").addEventListener("click", () => {
      codeTab.classList.remove("hidden");
      previewTab.classList.add("hidden");
      setActiveTab("tabCode");
    });

    function setActiveTab(activeId) {
      document.querySelectorAll(".tab-btn").forEach(btn => {
        if (btn.id === activeId) {
          btn.classList.add("border-neutral-900", "text-neutral-900");
          btn.classList.remove("border-transparent", "text-neutral-600");
        } else {
          btn.classList.add("border-transparent", "text-neutral-600");
          btn.classList.remove("border-neutral-900", "text-neutral-900");
        }
      });
    }
  </script>
</body>
</html>
