<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MUNify – Form Designer</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/ui.js"></script>
</head>
<body class="bg-neutral-50 dark:bg-neutral-900 text-neutral-900 min-h-screen flex flex-col">
<header class="border-b border-neutral-200 dark:border-neutral-700 bg-white dark:bg-neutral-800/70 backdrop-blur mb-6 site-foreground">
  <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
    <a href="../" class="font-semibold tracking-tight">MUNify</a>
    <nav class="hidden md:flex gap-6 text-sm">
      <a href="../" class="hover:underline font-medium">Home</a>
      <a href="./" class="hover:underline font-medium">Designer</a>
      <a href="../form/" class="hover:underline">Form</a>
      <a href="../settings/" class="hover:underline">Settings</a>
      <a href="../info/" class="hover:underline">Info</a>
    </nav>
    <div class="flex gap-2 items-center text-sm">
      <!-- Dark Mode Toggle -->
      <button data-dark-mode-toggle onclick="window.MUNui.toggleDarkMode()" 
              class="p-2 rounded-lg hover:bg-neutral-200 dark:hover:bg-neutral-700 transition-colors"
              aria-label="Toggle dark mode">
        <svg data-icon="moon" class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
          <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
        </svg>
        <svg data-icon="sun" class="w-4 h-4 hidden" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
        </svg>
      </button>
      <span id="signIndicator" class="text-green-600 hidden">Signed in</span>
      <button id="btnSignOutHome" class="underline hidden">Sign out</button>
    </div>
  </div>
</header>

  <!-- GOOGLE SIGN-IN CONTAINER -->
  <div id="loginContainer" class="flex justify-center items-center min-h-screen">
    <div class="text-center">
  <h1 class="text-3xl font-bold mb-6">Sign in to access this page</h1>
   <div id="g_id_onload"
     data-client_id="73123638661-ai7rhojisdd2kq7oc64out0t9s57k2d7.apps.googleusercontent.com"
     data-callback="handleCredentialResponse"
     data-auto_prompt="false"
     data-scope="https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/script.external_request https://www.googleapis.com/auth/script.scriptapp https://www.googleapis.com/auth/script.deployments https://www.googleapis.com/auth/script.projects https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive">
   </div>
      <div class="g_id_signin"
           data-type="standard"
           data-size="large"
           data-theme="outline"
           data-text="sign_in_with"
           data-shape="rectangular"
           data-logo_alignment="left">
      </div>
    </div>
  </div>

  <!-- MAIN DESIGNER -->
  <main class="flex-1 max-w-5xl mx-auto px-4 py-6 hidden pop-target">
    <div id="status" class="mb-4 text-sm"></div>

    <!-- Toolbar -->
    <div class="flex justify-between items-center mb-4">
      <div class="text-sm text-neutral-600 dark:text-neutral-400">Designer</div>
      <div class="flex items-center gap-2">
        <button id="btnSaveForm" class="px-3 py-1 bg-neutral-900 text-white rounded">Save</button>
        <button id="btnResetTemplate" class="px-3 py-1 border border-neutral-200 dark:border-neutral-700 rounded">Reset</button>
        <button id="btnSignOut" class="px-3 py-1 text-neutral-700 dark:text-neutral-300 hover:underline">Sign out</button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="border border-neutral-200 dark:border-neutral-700 mb-4 flex">
      <button id="tabPreview" class="tab-btn px-4 py-2 border border-neutral-200 dark:border-neutral-700-2 border border-neutral-200 dark:border-neutral-700-neutral-900 font-medium">Preview</button>
      <button id="tabCode" class="tab-btn px-4 py-2 border border-neutral-200 dark:border-neutral-700-2 border border-neutral-200 dark:border-neutral-700-transparent text-neutral-600 dark:text-neutral-400">Code</button>
    </div>

    <!-- Preview Tab -->
    <div id="previewTab" class="bg-white dark:bg-neutral-800 p-6 rounded-lg border border-neutral-200 dark:border-neutral-700 shadow-sm">
      <div id="editablePreview" contenteditable="true" class="min-h-[500px] outline-none"></div>
    </div>

    <!-- Code Tab -->
    <div id="codeTab" class="hidden">
  <label for="formCode" class="sr-only">Form HTML code editor</label>
  <textarea id="formCode" title="Form HTML code editor" placeholder="Paste or edit your form HTML here" class="w-full h-[500px] border border-neutral-200 dark:border-neutral-700 rounded-lg p-3 font-mono text-sm"></textarea>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-neutral-100 dark:bg-neutral-800 mt-12 py-6 text-center text-sm text-neutral-600 dark:text-neutral-400 border border-neutral-200 dark:border-neutral-700-t border border-neutral-200 dark:border-neutral-700-neutral-200">
    <div class="flex flex-col md:flex-row justify-center items-center gap-2">
      <span>© 2025 MUN Forms</span>
      <a href="https://github.com/NagusameCS/MUNify/tree/gh-pages" class="flex items-center gap-1 hover:underline" target="_blank" rel="noopener">
        <svg class="w-4 h-4 fill-current" viewBox="0 0 16 16">
          <path d="M8 0C3.58 0 0 3.58..."/>
        </svg>
        GitHub
      </a>
      <span>Licensed under GNU GPLv3</span>
    </div>
  </footer>

  <script>
    // --- GOOGLE SIGN-IN CALLBACK ---
    function handleCredentialResponse(response) {
      console.log("JWT ID token:", response.credential);
      // Save login state
  localStorage.setItem("munifyLoggedIn", "true");
  // store id token in munify_config so the auth helper can use it
  try { const cfg = JSON.parse(localStorage.getItem('munify_config')||'{}'); cfg.idToken = response.credential; localStorage.setItem('munify_config', JSON.stringify(cfg)); } catch(e){console.warn('Could not save id token', e);}

      // Hide login, show main designer
      document.getElementById("loginContainer").style.display = "none";
      document.querySelector("main").style.display = "block";

      // Attempt automatic registration if available, then initialize designer
      (async function(){
        if (window.MUNauth && typeof window.MUNauth.autoRegisterIfNeeded === 'function') {
          try { await window.MUNauth.autoRegisterIfNeeded(); } catch(e){ console.warn('autoRegisterIfNeeded error', e); }
        }
        initDesigner();
      })();
    }

    // --- CHECK LOGIN ON PAGE LOAD ---
    const loggedIn = localStorage.getItem("munifyLoggedIn") === "true";
    if (loggedIn) {
      document.getElementById("loginContainer").style.display = "none";
      document.querySelector("main").style.display = "block";
      (async function(){ if (window.MUNauth && typeof window.MUNauth.autoRegisterIfNeeded === 'function') { try { await window.MUNauth.autoRegisterIfNeeded(); } catch(e){ console.warn('autoRegisterIfNeeded error', e); } } initDesigner(); })();
    }

    // --- INITIALIZE DESIGNER ---
    function initDesigner() {
      // Sync with MUNauth config if available
      if (window.MUNauth) {
        const cfg = window.MUNauth.getConfig();
        if (cfg.sheetId) localStorage.setItem('munifySheetId', cfg.sheetId);
      }
      const scriptUrl = localStorage.getItem("munifyScriptUrl") || "Not set";
      const sheetId = localStorage.getItem("munifySheetId") || "Not set";
      const status = document.getElementById("status");
      const previewTab = document.getElementById("previewTab");
      const codeTab = document.getElementById("codeTab");
      const formCode = document.getElementById("formCode");
      const editablePreview = document.getElementById("editablePreview");

      // Status
      status.textContent = `✅ Connected to Apps Script at ${scriptUrl} (Sheet ID: ${sheetId})`;

      // Base template
      const baseTemplate = `
<div class="max-w-xl mx-auto">
  <h1 class="text-3xl font-bold mb-2">Example MUNify Form</h1>
  <p class="mb-6 text-neutral-700 dark:text-neutral-300">Please complete this registration form for the upcoming Model UN conference.</p>
  
  <label class="block mb-4">
    <span class="block font-medium">Full Name</span>
    <input type="text" name="name" class="mt-1 block w-full border border-neutral-200 dark:border-neutral-700 rounded-lg p-2" required>
  </label>

  <label class="block mb-4">
    <span class="block font-medium">Country</span>
    <input type="text" name="country" class="mt-1 block w-full border border-neutral-200 dark:border-neutral-700 rounded-lg p-2" required>
  </label>

  <label class="block mb-6">
    <span class="block font-medium">Opening Speech</span>
    <textarea name="speech" rows="4" class="mt-1 block w-full border border-neutral-200 dark:border-neutral-700 rounded-lg p-2" required></textarea>
  </label>

  <button type="submit" class="bg-neutral-900 text-white px-4 py-2 rounded-lg">Submit</button>
</div>
`;

  const savedCode = localStorage.getItem("munifyFormCode") || baseTemplate;
      formCode.value = savedCode;
      editablePreview.innerHTML = savedCode;

      // Sync: Code → Preview
      formCode.addEventListener("input", () => {
        editablePreview.innerHTML = formCode.value;
        autoSave();
      });

      // Sync: Preview → Code
      editablePreview.addEventListener("input", () => {
        formCode.value = editablePreview.innerHTML;
        autoSave();
      });

      function autoSave() {
        localStorage.setItem("munifyFormCode", formCode.value);
      }

      // Save button
      document.getElementById("btnSaveForm").addEventListener("click", () => {
        autoSave();
        window.MUNui.toast('Form saved locally', { type: 'success' });
      });

      // Reset template button
      document.getElementById("btnResetTemplate").addEventListener("click", async () => {
        const ok = await window.MUNui.confirm('Reset the form to the default template? This will overwrite your current code.');
        if (!ok) return;
        formCode.value = baseTemplate;
        editablePreview.innerHTML = baseTemplate;
        autoSave();
        status.textContent = 'Template reset to default.';
        window.MUNui.toast('Template reset to default', { type: 'success' });
      });

      // Sign out button
      document.getElementById("btnSignOut").addEventListener("click", () => {
        // Clear login flag and show sign-in container
        localStorage.removeItem('munifyLoggedIn');
        document.querySelector('main').style.display = 'none';
        document.getElementById('loginContainer').style.display = 'flex';
      });

      // Intercept form submissions inside the editable preview so the page doesn't navigate.
      document.addEventListener('submit', (e) => {
        try {
          if (editablePreview.contains(e.target)) {
            e.preventDefault();
            const form = e.target;
            const fd = new FormData(form);
            const obj = {};
            for (const [k, v] of fd.entries()) {
              if (Object.prototype.hasOwnProperty.call(obj, k)) {
                if (Array.isArray(obj[k])) obj[k].push(v);
                else obj[k] = [obj[k], v];
              } else {
                obj[k] = v;
              }
            }
            console.log('Intercepted form submission (local):', obj);
            localStorage.setItem('munifyLastSubmission', JSON.stringify(obj));
            status.textContent = 'Form submitted (saved locally).';
            window.MUNui.toast('Form submission saved locally', { type: 'success' });
          }
        } catch (err) {
          console.error(err);
        }
      }, true);

  // Tabs
      document.getElementById("tabPreview").addEventListener("click", () => {
        previewTab.classList.remove("hidden");
        codeTab.classList.add("hidden");
        setActiveTab("tabPreview");
      });

      document.getElementById("tabCode").addEventListener("click", () => {
        codeTab.classList.remove("hidden");
        previewTab.classList.add("hidden");
        setActiveTab("tabCode");
      });

  // Ensure a default active tab
  setActiveTab('tabPreview');

      function setActiveTab(activeId) {
        document.querySelectorAll(".tab-btn").forEach(btn => {
          if (btn.id === activeId) {
            btn.classList.add("border border-neutral-200 dark:border-neutral-700-neutral-900", "text-neutral-900");
            btn.classList.remove("border border-neutral-200 dark:border-neutral-700-transparent", "text-neutral-600 dark:text-neutral-400");
          } else {
            btn.classList.add("border border-neutral-200 dark:border-neutral-700-transparent", "text-neutral-600 dark:text-neutral-400");
            btn.classList.remove("border border-neutral-200 dark:border-neutral-700-neutral-900", "text-neutral-900");
          }
        });
      }
    }
  </script>
</body>
</html>
