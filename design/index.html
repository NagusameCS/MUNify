<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MUNify – Form Designer</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../assets/js/theme.js" defer></script>
  <script type="module" src="../assets/js/core.js" data-auto></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script>/* early theme apply */(function(){try{var m=localStorage.getItem('munify-dark-mode');if(m==='true')document.documentElement.classList.add('dark');}catch(e){} })();</script>
</head>
<body class="bg-neutral-50 text-neutral-900 min-h-screen flex flex-col dark:bg-neutral-900 dark:text-neutral-100">
  <a href="#mainContent" class="sr-only focus:outline-none focus:ring-2 focus:ring-blue-600 focus:ring-offset-2 focus:ring-offset-neutral-900">Skip to content</a>
  <div id="earth-bg"></div>
  <header class="max-w-6xl mx-auto px-4 py-6 flex items-center justify-between site-foreground">
    <a href="../" class="flex items-center gap-2 font-semibold">MUNify</a>
    <nav class="text-sm hidden sm:flex gap-6" aria-label="Primary">
      <a href="../" class="hover:underline">Home</a>
      <a href="./" class="hover:underline font-medium" aria-current="page">Designer</a>
      <a href="../form/" class="hover:underline">Form</a>
      <a href="../settings/" class="hover:underline">Settings</a>
      <a href="../info/" class="hover:underline">Info</a>
    </nav>
    <div class="flex items-center gap-3">
      <button data-theme-toggle aria-pressed="true" class="p-2 rounded-md border border-neutral-700/40 dark:border-neutral-600 text-xs flex items-center gap-1 focus:outline-none focus:ring-2 focus:ring-blue-600" title="Toggle theme">
        <span data-icon="sun" class="material-symbols-rounded" style="display:none">light_mode</span>
        <span data-icon="moon" class="material-symbols-rounded">dark_mode</span>
        <span class="sr-only">Toggle color theme</span>
      </button>
      <button id="btnSignOutHome" class="text-xs underline hidden">Sign out</button>
    </div>
  </header>

  <!-- GOOGLE SIGN-IN CONTAINER -->
  <div id="loginContainer" class="flex justify-center items-center flex-1 py-20">
    <div class="text-center frost-pane p-8 rounded-2xl border" data-frost>
  <h1 class="text-3xl font-bold mb-6">Sign in to use the Designer</h1>
   <div id="g_id_onload"
     data-client_id="73123638661-ai7rhojisdd2kq7oc64out0t9s57k2d7.apps.googleusercontent.com"
     data-callback="handleCredentialResponse"
     data-auto_prompt="false"
     data-scope="https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/script.external_request https://www.googleapis.com/auth/script.scriptapp https://www.googleapis.com/auth/script.deployments https://www.googleapis.com/auth/script.projects https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive">
   </div>
      <div class="g_id_signin"
           data-type="standard"
           data-size="large"
           data-theme="outline"
           data-text="sign_in_with"
           data-shape="rectangular"
           data-logo_alignment="left">
      </div>
    </div>
  </div>

  <!-- MAIN DESIGNER -->
  <main id="mainContent" class="max-w-5xl mx-auto px-4 py-6 hidden pop-target flex-1 w-full site-foreground">
    <div id="status" class="mb-4 text-sm"></div>

    <!-- Toolbar -->
    <div class="flex justify-between items-center mb-4">
      <div class="text-sm text-neutral-600">Designer</div>
      <div class="flex items-center gap-2">
        <button id="btnSaveForm" class="px-3 py-1 bg-neutral-900 text-white rounded">Save</button>
        <button id="btnResetTemplate" class="px-3 py-1 border rounded">Reset</button>
        <button id="btnSignOut" class="px-3 py-1 text-neutral-700 hover:underline">Sign out</button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="border-b mb-4 flex">
      <button id="tabPreview" class="tab-btn px-4 py-2 border-b-2 border-neutral-900 font-medium">Preview</button>
      <button id="tabCode" class="tab-btn px-4 py-2 border-b-2 border-transparent text-neutral-600">Code</button>
    </div>

    <!-- Preview Tab -->
  <div id="previewTab" class="frost-pane p-6 rounded-xl border" data-frost>
      <div id="editablePreview" contenteditable="true" class="min-h-[500px] outline-none"></div>
    </div>

    <!-- Code Tab -->
  <div id="codeTab" class="hidden frost-pane p-0 rounded-xl border" data-frost>
  <label for="formCode" class="sr-only">Form HTML code editor</label>
  <textarea id="formCode" title="Form HTML code editor" placeholder="Paste or edit your form HTML here" class="w-full h-[500px] border rounded-lg p-3 font-mono text-sm"></textarea>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-neutral-100 mt-12 py-6 text-center text-sm text-neutral-600 border-t border-neutral-200 dark:bg-neutral-800 dark:text-neutral-400 dark:border-neutral-700 site-foreground">
    <div class="flex flex-col md:flex-row justify-center items-center gap-2">
      <span>© 2025 MUN Forms</span>
      <a href="https://github.com/NagusameCS/MUNify/tree/gh-pages" class="flex items-center gap-1 hover:underline" target="_blank" rel="noopener">
        <svg class="w-4 h-4 fill-current" viewBox="0 0 16 16">
          <path d="M8 0C3.58 0 0 3.58..."/>
        </svg>
        GitHub
      </a>
      <span>Licensed under GNU GPLv3</span>
    </div>
  </footer>

  <script>
    // Minimal sign-out mirror with homepage style
    document.addEventListener('DOMContentLoaded', ()=>{
      const so = document.getElementById('btnSignOutHome');
      if (so) so.addEventListener('click', ()=>{ const c=JSON.parse(localStorage.getItem('munify_config')||'{}'); delete c.idToken; delete c.key; localStorage.setItem('munify_config', JSON.stringify(c)); location.reload(); });
    });
    // --- GOOGLE SIGN-IN CALLBACK ---
    function handleCredentialResponse(response) {
      console.log("JWT ID token:", response.credential);
      // Save login state
  localStorage.setItem("munifyLoggedIn", "true");
  // store id token in munify_config so the auth helper can use it
  try { const cfg = JSON.parse(localStorage.getItem('munify_config')||'{}'); cfg.idToken = response.credential; localStorage.setItem('munify_config', JSON.stringify(cfg)); } catch(e){console.warn('Could not save id token', e);}

      // Hide login, show main designer
      document.getElementById("loginContainer").style.display = "none";
      document.querySelector("main").style.display = "block";

      // Attempt automatic registration if available, then initialize designer
      (async function(){
        if (window.MUNauth && typeof window.MUNauth.autoRegisterIfNeeded === 'function') {
          try { await window.MUNauth.autoRegisterIfNeeded(); } catch(e){ console.warn('autoRegisterIfNeeded error', e); }
        }
        initDesigner();
      })();
    }

    // --- CHECK LOGIN ON PAGE LOAD ---
  const loggedIn = localStorage.getItem("munifyLoggedIn") === "true" || !!(JSON.parse(localStorage.getItem('munify_config')||'{}').idToken);
    if (loggedIn) {
      document.getElementById("loginContainer").style.display = "none";
      document.querySelector("main").style.display = "block";
      (async function(){ if (window.MUNauth && typeof window.MUNauth.autoRegisterIfNeeded === 'function') { try { await window.MUNauth.autoRegisterIfNeeded(); } catch(e){ console.warn('autoRegisterIfNeeded error', e); } } initDesigner(); })();
    }

    // --- INITIALIZE DESIGNER ---
    function initDesigner() {
      // Sync with MUNauth config if available
      if (window.MUNauth) {
        const cfg = window.MUNauth.getConfig();
        if (cfg.sheetId) localStorage.setItem('munifySheetId', cfg.sheetId);
      }
      const scriptUrl = localStorage.getItem("munifyScriptUrl") || "Not set";
      const sheetId = localStorage.getItem("munifySheetId") || "Not set";
      const status = document.getElementById("status");
      const previewTab = document.getElementById("previewTab");
      const codeTab = document.getElementById("codeTab");
      const formCode = document.getElementById("formCode");
      const editablePreview = document.getElementById("editablePreview");

      // Status
      status.textContent = `✅ Connected to Apps Script at ${scriptUrl} (Sheet ID: ${sheetId})`;

      // Base template
      const baseTemplate = `
<div class="max-w-xl mx-auto">
  <h1 class="text-3xl font-bold mb-2">Example MUNify Form</h1>
  <p class="mb-6 text-neutral-700">Please complete this registration form for the upcoming Model UN conference.</p>
  
  <label class="block mb-4">
    <span class="block font-medium">Full Name</span>
    <input type="text" name="name" class="mt-1 block w-full border rounded-lg p-2" required>
  </label>

  <label class="block mb-4">
    <span class="block font-medium">Country</span>
    <input type="text" name="country" class="mt-1 block w-full border rounded-lg p-2" required>
  </label>

  <label class="block mb-6">
    <span class="block font-medium">Opening Speech</span>
    <textarea name="speech" rows="4" class="mt-1 block w-full border rounded-lg p-2" required></textarea>
  </label>

  <button type="submit" class="bg-neutral-900 text-white px-4 py-2 rounded-lg">Submit</button>
</div>
`;

  const savedCode = localStorage.getItem("munifyFormCode") || baseTemplate;
      formCode.value = savedCode;
      editablePreview.innerHTML = savedCode;

      // Sync: Code → Preview
      formCode.addEventListener("input", () => {
        editablePreview.innerHTML = formCode.value;
        autoSave();
      });

      // Sync: Preview → Code
      editablePreview.addEventListener("input", () => {
        formCode.value = editablePreview.innerHTML;
        autoSave();
      });

      function autoSave() {
        localStorage.setItem("munifyFormCode", formCode.value);
      }

      // Save button
      document.getElementById("btnSaveForm").addEventListener("click", () => {
        autoSave();
        window.MUNui.toast('Form saved locally', { type: 'success' });
      });

      // Reset template button
      document.getElementById("btnResetTemplate").addEventListener("click", async () => {
        const ok = await window.MUNui.confirm('Reset the form to the default template? This will overwrite your current code.');
        if (!ok) return;
        formCode.value = baseTemplate;
        editablePreview.innerHTML = baseTemplate;
        autoSave();
        status.textContent = 'Template reset to default.';
        window.MUNui.toast('Template reset to default', { type: 'success' });
      });

      // Sign out button
      document.getElementById("btnSignOut").addEventListener("click", () => {
        // Clear login flag and show sign-in container
        localStorage.removeItem('munifyLoggedIn');
        document.querySelector('main').style.display = 'none';
        document.getElementById('loginContainer').style.display = 'flex';
      });

      // Intercept form submissions inside the editable preview so the page doesn't navigate.
      document.addEventListener('submit', (e) => {
        try {
          if (editablePreview.contains(e.target)) {
            e.preventDefault();
            const form = e.target;
            const fd = new FormData(form);
            const obj = {};
            for (const [k, v] of fd.entries()) {
              if (Object.prototype.hasOwnProperty.call(obj, k)) {
                if (Array.isArray(obj[k])) obj[k].push(v);
                else obj[k] = [obj[k], v];
              } else {
                obj[k] = v;
              }
            }
            console.log('Intercepted form submission (local):', obj);
            localStorage.setItem('munifyLastSubmission', JSON.stringify(obj));
            status.textContent = 'Form submitted (saved locally).';
            window.MUNui.toast('Form submission saved locally', { type: 'success' });
          }
        } catch (err) {
          console.error(err);
        }
      }, true);

  // Tabs
      document.getElementById("tabPreview").addEventListener("click", () => {
        previewTab.classList.remove("hidden");
        codeTab.classList.add("hidden");
        setActiveTab("tabPreview");
      });

      document.getElementById("tabCode").addEventListener("click", () => {
        codeTab.classList.remove("hidden");
        previewTab.classList.add("hidden");
        setActiveTab("tabCode");
      });

  // Ensure a default active tab
  setActiveTab('tabPreview');

      function setActiveTab(activeId) {
        document.querySelectorAll(".tab-btn").forEach(btn => {
          if (btn.id === activeId) {
            btn.classList.add("border-neutral-900", "text-neutral-900");
            btn.classList.remove("border-transparent", "text-neutral-600");
          } else {
            btn.classList.add("border-transparent", "text-neutral-600");
            btn.classList.remove("border-neutral-900", "text-neutral-900");
          }
        });
      }
    }
  </script>
</body>
</html>
