<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MUNify – Form Designer</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-50 text-neutral-900">
  <header class="max-w-5xl mx-auto px-4 py-6 flex items-center justify-between">
    <a href="/MUNify/" class="flex items-center gap-2 font-semibold">MUNify</a>
    <nav class="text-sm hidden sm:flex gap-6">
      <a href="/MUNify/info/" class="hover:underline">Info & Permissions</a>
      <a href="/MUNify/design/" class="hover:underline font-semibold text-[#3e4f5e]">Form Designer</a>
    </nav>
  </header>

  <main class="max-w-5xl mx-auto px-4 space-y-6">
    <h1 class="text-3xl font-bold">Form Designer</h1>
    <p class="text-neutral-700">Create and customize your MUN forms here. All changes are saved in your connected Google Sheet via Apps Script.</p>

    <div id="status" class="p-4 rounded-lg border bg-white"></div>

    <div id="designerUI" class="hidden">
      <div class="bg-white border rounded-lg p-4 shadow">
        <h2 class="font-semibold mb-3">Live Preview</h2>
        <textarea id="formCode" class="w-full h-40 border rounded-lg p-2 font-mono"></textarea>
        <div class="mt-4 flex gap-2">
          <button id="btnSaveForm" class="px-3 py-2 rounded-2xl bg-neutral-900 text-white">Save Form</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-neutral-100 mt-12 py-6 text-center text-sm text-neutral-600 border-t border-neutral-200">
    <div class="flex flex-col md:flex-row justify-center items-center gap-2">
      <span>© 2025 MUN Forms</span>
      <a href="https://github.com/NagusameCS/MUNify/tree/gh-pages" class="flex items-center gap-1 hover:underline" target="_blank" rel="noopener">
        <svg class="w-4 h-4 fill-current" viewBox="0 0 16 16">
          <path d="M8 0C3.58 0 0 3.58..."/>
        </svg>
        GitHub
      </a>
      <span>Licensed under GNU GPLv3</span>
    </div>
  </footer>

  <script>
    const scriptUrl = localStorage.getItem("munifyScriptUrl");
    const sheetId = localStorage.getItem("munifySheetId");

    if (!scriptUrl || !sheetId) {
      document.getElementById("status").textContent = "⚠ Please configure your Apps Script Web App URL and Sheet ID on the homepage before using the designer.";
    } else {
      document.getElementById("status").textContent = `✅ Connected to Apps Script at ${scriptUrl} (Sheet ID: ${sheetId})`;
      document.getElementById("designerUI").classList.remove("hidden");
    }

    document.getElementById("btnSaveForm")?.addEventListener("click", () => {
      alert("Form saving will be implemented here.");
    });
  </script>
</body>
</html>
