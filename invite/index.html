<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MUNify Invite</title>
<link rel="stylesheet" href="/assets/css/style.css">
<script src="/assets/js/auth.js"></script>
<script src="/assets/js/ui.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-neutral-50 dark:bg-neutral-900 text-neutral-900 min-h-screen flex flex-col">
<header class="border-b border-neutral-200 dark:border-neutral-700 bg-white dark:bg-neutral-800/70 backdrop-blur mb-6 site-foreground">
  <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
    <a href="../" class="font-semibold tracking-tight">MUNify</a>
    <nav class="hidden md:flex gap-6 text-sm">
      <a href="../" class="hover:underline font-medium">Home</a>
      <a href="../design/" class="hover:underline">Designer</a>
      <a href="../form/" class="hover:underline">Form</a>
      <a href="../settings/" class="hover:underline">Settings</a>
      <a href="../info/" class="hover:underline">Info</a>
    </nav>
    <div class="flex gap-2 items-center text-sm">
      <!-- Dark Mode Toggle -->
      <button data-dark-mode-toggle onclick="window.MUNui.toggleDarkMode()" 
              class="p-2 rounded-lg hover:bg-neutral-200 dark:hover:bg-neutral-700 transition-colors"
              aria-label="Toggle dark mode">
        <svg data-icon="moon" class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
          <path d="M17.293 13.293A8 8 0 6.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
        </svg>
        <svg data-icon="sun" class="w-4 h-4 hidden" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
        </svg>
      </button>
      <span id="signIndicator" class="text-green-600 hidden">Signed in</span>
      <button id="btnSignOutHome" class="underline hidden">Sign out</button>
    </div>
  </div>
</header>
<main class="flex-1 max-w-2xl mx-auto p-6">
    <h1 class="text-xl font-bold mb-4">Redeem Invite</h1>
    <p class="mb-4 text-sm">Open the invite link you received. Sign in and click Redeem to be added to the form's whitelist.</p>
    <div class="mb-4">
      <label class="block text-sm">Invite Token
        <input id="token" class="mt-1 block w-full border border-neutral-200 dark:border-neutral-700 rounded p-2" />
      </label>
    </div>
    <div class="flex gap-2">
      <button id="btnRedeem" class="px-3 py-2 rounded bg-green-600 text-white">Redeem</button>
      <button id="btnSignIn" class="px-3 py-2 border border-neutral-200 dark:border-neutral-700 rounded">Sign in</button>
    </div>
    <div id="status" class="mt-4 text-sm"></div>
    <p class="mb-4 text-xs text-neutral-600 dark:text-neutral-400">Need help? See <a href="../info/" class="underline">Info</a>.</p>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const raw = location.hash ? location.hash.slice(1) : '';
      const tokenInput = document.getElementById('token');
      if (raw) tokenInput.value = raw;
      document.getElementById('btnSignIn').addEventListener('click', async ()=>{
        try { await window.MUNauth.requestAccess(); window.MUNui.toast('Signed in', { type: 'success' }); } catch(e){ document.getElementById('status').textContent = 'Sign in failed: ' + (e.message||e); window.MUNui.toast('Sign in failed: ' + (e.message||e), { type: 'error' }); }
      });
      document.getElementById('btnRedeem').addEventListener('click', async ()=>{
        const token = tokenInput.value.trim();
        if (!token) { window.MUNui.toast('Enter invite token', { type: 'warn' }); return; }
        try {
          await window.MUNauth.requestAccess();
          const appsScriptUrl = localStorage.getItem('munifyAppsScriptUrl');
          if (!appsScriptUrl) { window.MUNui.toast('Server not configured', { type: 'error' }); return; }
          const res = await window.MUNauth.redeemInvite(appsScriptUrl, token);
          window.MUNui.toast('Redeemed! You can now submit', { type: 'success' });
  } catch (err) { console.error(err); document.getElementById('status').textContent = 'Could not redeem invite: ' + (err.message || err); window.MUNui.toast('Could not redeem invite: ' + (err.message || err), { type: 'error' }); }
      });

      // Attempt automatic registration/provisioning if possible
      (async function(){
        if (window.MUNauth && typeof window.MUNauth.autoRegisterIfNeeded === 'function') {
          try { await window.MUNauth.autoRegisterIfNeeded(); } catch(e){ console.warn('autoRegisterIfNeeded failed', e); }
        }
      })();
    });
  </script>
  
  <!-- Footer -->
  <footer class="bg-neutral-100 dark:bg-neutral-800 mt-12 py-6 text-center text-sm text-neutral-600 dark:text-neutral-300 border-t border-neutral-200 dark:border-neutral-700">
    <div class="flex flex-col md:flex-row justify-center items-center gap-2">
      <span>© 2025 MUN Forms</span>
      <a href="https://github.com/NagusameCS/MUNify/tree/gh-pages" class="flex items-center gap-1 hover:underline" target="_blank" rel="noopener">
        <svg class="w-4 h-4 fill-current" viewBox="0 0 16 16" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.65 7.65 0 018 4.59c.68 0 1.36.09 2 .26 1.53-1.03 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        GitHub
      </a>
      <span>Licensed under GNU GPLv3</span>
    </div>
  </footer>
</body>
</html>
