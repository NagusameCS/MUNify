<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MUNify – Invite</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../assets/js/theme.js" defer></script>
  <script type="module" src="../assets/js/core.js" data-auto></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>/* early theme apply */(function(){try{var m=localStorage.getItem('munify-dark-mode');if(m==='true')document.documentElement.classList.add('dark');}catch(e){} })();</script>
  <style>#earth-bg, #earth-bg canvas{position:fixed;inset:0;pointer-events:none;z-index:0;width:100%;height:100%;}</style>
</head>
<body class="bg-neutral-50 text-neutral-900 min-h-screen flex flex-col dark:bg-neutral-900 dark:text-neutral-100">
  <a href="#mainContent" class="sr-only focus:outline-none focus:ring-2 focus:ring-blue-600 focus:ring-offset-2 focus:ring-offset-neutral-900">Skip to content</a>
  <div id="earth-bg"></div>
  <header class="max-w-6xl mx-auto px-4 py-6 flex items-center justify-between site-foreground">
    <a href="../" class="flex items-center gap-2 font-semibold">MUNify</a>
    <nav class="hidden md:flex gap-6 text-sm" aria-label="Primary">
      <a href="../" class="hover:underline">Home</a>
      <a href="../design/" class="hover:underline">Designer</a>
      <a href="../form/" class="hover:underline">Form</a>
      <a href="../settings/" class="hover:underline">Settings</a>
      <a href="../info/" class="hover:underline">Info</a>
    </nav>
    <div class="flex items-center gap-3">
      <button data-theme-toggle aria-pressed="true" class="p-2 rounded-md border border-neutral-700/40 dark:border-neutral-600 text-xs flex items-center gap-1 focus:outline-none focus:ring-2 focus:ring-blue-600" title="Toggle theme">
        <span data-icon="sun" class="material-symbols-rounded" style="display:none">light_mode</span>
        <span data-icon="moon" class="material-symbols-rounded">dark_mode</span>
        <span class="sr-only">Toggle color theme</span>
      </button>
    </div>
  </header>
  <main id="mainContent" class="max-w-2xl mx-auto px-4 py-10 flex-1 w-full site-foreground">
    <div class="frost-pane p-6 rounded-xl border mb-8" data-frost>
      <h1 class="text-xl font-bold mb-4">Redeem Invite</h1>
      <p class="mb-4 text-sm">Open the invite link you received. Sign in and click Redeem to be added to the form's whitelist.</p>
      <div class="mb-4">
        <label class="block text-sm">Invite Token
          <input id="token" class="mt-1 block w-full border rounded-lg p-2" />
        </label>
      </div>
      <div class="flex gap-2 mb-2">
        <button id="btnRedeem" class="px-3 py-2 rounded bg-green-600 text-white">Redeem</button>
        <button id="btnSignIn" class="px-3 py-2 border rounded">Sign in</button>
      </div>
      <div id="status" class="mt-2 text-sm" aria-live="polite"></div>
      <p class="mt-4 text-xs text-neutral-600 dark:text-neutral-400">Need help? See <a href="../info/" class="underline">Info</a>.</p>
    </div>
  </main>

  <footer class="bg-neutral-100 mt-12 py-6 text-center text-sm text-neutral-600 border-t border-neutral-200 dark:bg-neutral-800 dark:text-neutral-400 dark:border-neutral-700 site-foreground">
    <div class="flex flex-col md:flex-row justify-center items-center gap-2">
      <span>© 2025 MUN Forms</span>
      <a href="https://github.com/NagusameCS/MUNify/tree/gh-pages" class="hover:underline" target="_blank" rel="noopener">GitHub</a>
      <span>GPLv3</span>
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const raw = location.hash ? location.hash.slice(1) : '';
      const tokenInput = document.getElementById('token');
      if (raw) tokenInput.value = raw;
      document.getElementById('btnSignIn').addEventListener('click', async ()=>{
        try { await window.MUNauth.requestAccess(); window.MUNui.toast('Signed in', { type: 'success' }); } catch(e){ document.getElementById('status').textContent = 'Sign in failed: ' + (e.message||e); window.MUNui.toast('Sign in failed: ' + (e.message||e), { type: 'error' }); }
      });
      document.getElementById('btnRedeem').addEventListener('click', async ()=>{
        const token = tokenInput.value.trim();
        if (!token) { window.MUNui.toast('Enter invite token', { type: 'warn' }); return; }
        try {
          await window.MUNauth.requestAccess();
          const appsScriptUrl = localStorage.getItem('munifyAppsScriptUrl');
          if (!appsScriptUrl) { window.MUNui.toast('Server not configured', { type: 'error' }); return; }
          await window.MUNauth.redeemInvite(appsScriptUrl, token);
          window.MUNui.toast('Redeemed! You can now submit', { type: 'success' });
        } catch (err) { console.error(err); document.getElementById('status').textContent = 'Could not redeem invite: ' + (err.message || err); window.MUNui.toast('Could not redeem invite: ' + (err.message || err), { type: 'error' }); }
      });

      (async function(){
        if (window.MUNauth && typeof window.MUNauth.autoRegisterIfNeeded === 'function') {
          try { await window.MUNauth.autoRegisterIfNeeded(); } catch(e){ console.warn('autoRegisterIfNeeded failed', e); }
        }
      })();
    });
  </script>
</body>
</html>
